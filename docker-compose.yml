services:
  lbv-lux-api:
    build: .
    restart: always
    ports:
      - "127.0.0.1:2100:2100"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q0-", "http://localhost:2100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - lux-network
  
  redis:
    image: redis:7-alpine
    container_name: lbv-lux-redis1
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - lux-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
  
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lbv-lux-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - lbv-lux-api
    networks:
      - lux-network

volumes:
  redis-data:

networks:
  lux-network:
    external: true
